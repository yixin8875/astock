name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            platform: windows/amd64
            archive: astock-${{ github.ref_name }}-windows-amd64.zip
          - name: macos-arm64
            platform: darwin/arm64
            archive: astock-${{ github.ref_name }}-macos-arm64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        run: wails build -platform "${{ matrix.platform }}" -nopackage -m -clean

      - name: Package
        env:
          ARCHIVE: ${{ matrix.archive }}
        run: |
          ls -lah build/bin || true
          BINARY=""
          if [ "${{ matrix.platform }}" = "windows/amd64" ]; then
            for f in build/bin/astock*.exe; do
              if [ -f "$f" ]; then
                BINARY="$f"
                break
              fi
            done
          else
            for f in build/bin/astock*; do
              if [ -f "$f" ] && [[ "$f" != *.exe ]]; then
                BINARY="$f"
                break
              fi
            done
          fi
          test -n "${BINARY}"
          test -f "${BINARY}"
          mkdir -p release
          zip -j "${ARCHIVE}" "${BINARY}"
          mv "${ARCHIVE}" release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/${{ matrix.archive }}

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum *.zip > checksums-${{ github.ref_name }}.txt

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.zip
            release/checksums-${{ github.ref_name }}.txt
          generate_release_notes: true
